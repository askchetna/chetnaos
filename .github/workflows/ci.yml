name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Test backend imports
      run: |
        python -c "from backend.app import app; print('Backend imports successful')"
        python -c "from src.chetnaos.runtime import ChetnaRuntime; print('Runtime OK')"

    - name: Pytest suite
      run: python -m pytest tests/ -q --tb=no
