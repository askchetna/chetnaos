<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalpavriksha Land Evaluator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <h2>🌳 Kalpavriksha Land Evaluator</h2>
        <p class="subtitle">Evaluate your farmland potential instantly</p>

        <div class="form-section">
            <label>Soil pH</label>
            <input id="ph" type="number" step="0.1" placeholder="e.g. 7.0">

            <label>Water Table Depth (ft)</label>
            <input id="water" type="number" placeholder="e.g. 80">

            <label>Soil Type</label>
            <select id="soil">
                <option value="loamy">Loamy</option>
                <option value="red">Red Soil</option>
                <option value="sandy-loam">Sandy Loam</option>
                <option value="black">Black Soil</option>
            </select>

            <label>Temperature (°C)</label>
            <input id="temp" type="number" placeholder="e.g. 28">

            <label>Road Access</label>
            <select id="road">
                <option value="highway">Highway</option>
                <option value="village">Village Road</option>
                <option value="mud">Mud Road</option>
            </select>

            <button onclick="evaluateLand()">Evaluate Land</button>
        </div>

        <div id="result" class="result-box hidden">
            <h3>Evaluation Result</h3>
            <pre id="output"></pre>
        </div>

    </div>

    <script src="js/app.js"></script>
</body>

</html>
