<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ChetnaOS Conscious Runtime v1.0</title>
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; margin: 0; background: #f6f7f9; color: #111827; }
      .container { max-width: 800px; margin: 0 auto; padding: 24px; }
      h1 { font-size: 22px; margin: 0 0 8px; }
      .subheading { font-size: 13px; color: #6b7280; margin-bottom: 16px; }
      .mode-selector { margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
      .mode-selector label { font-size: 14px; }
      .mode-selector select { padding: 4px 8px; border-radius: 4px; border: 1px solid #d1d5db; background: #fff; }
      #chat { background: #fff; border: 1px solid #e5e7eb; border-radius: 8px; padding: 16px; height: 60vh; overflow-y: auto; box-shadow: 0 1px 2px rgba(15,23,42,0.04); }
      .row { display: flex; gap: 8px; margin-top: 12px; }
      textarea { flex: 1; min-height: 60px; padding: 10px; border: 1px solid #d1d5db; border-radius: 6px; resize: vertical; font-family: inherit; font-size: 14px; }
      textarea:focus { outline: 2px solid #93c5fd; outline-offset: 1px; }
      button { padding: 10px 16px; border: none; background: #111827; color: #fff; border-radius: 6px; cursor: pointer; font-size: 14px; }
      button:hover:not(:disabled) { background: #374151; }
      button:disabled { background: #6b7280; cursor: not-allowed; }
      .bubble { max-width: 75%; padding: 10px 12px; border-radius: 12px; margin: 6px 0; line-height: 1.3; white-space: pre-wrap; font-size: 14px; }
      .user { background: #dbedff; align-self: flex-end; margin-left: auto; }
      .assistant { background: #f3f4f6; }
      .error { background: #fee2e2; color: #991b1b; }
      .chatline { display: flex; }
      .typing { font-style: italic; color: #6b7280; }
      .os-button { display: inline-block; padding: 10px 18px; margin-bottom: 16px; background: #2E8B57; color: white; text-decoration: none; border-radius: 6px; font-weight: 500; font-size: 14px; }
      .os-button:hover { background: #246b44; }
    </style>
  </head>
  <body>
    <div class="container">
      <a href="./kalpavriksha_ui/index.html" class="os-button">
        🌳 Launch Kalpavriksha
      </a>
      <h1>ChetnaOS</h1>
      <div class="subheading">Conscious Runtime v1.0</div>
      <div class="mode-selector">
        <label for="modeSelect">Mode:</label>
        <select id="modeSelect">
          <option value="chat" selected>Chat</option>
          <option value="agent">Agent</option>
          <option value="goal">Goal</option>
        </select>
      </div>
      <div id="chat" aria-live="polite" aria-label="Chat transcript"></div>
      <div class="row">
        <textarea id="msg" placeholder="Type your message... (Agent mode: try 'calc: 2+2' or 'search AI news')"></textarea>
        <button id="send">Send</button>
      </div>
    </div>
    <script src="app.js"></script>
  </body>
  </html>
