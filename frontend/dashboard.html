<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>ChetnaOS — Cognitive Dashboard</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#060910;--s1:#0c0f1c;--s2:#111628;--s3:#172035;--border:#1e2848;
      --accent:#6366f1;--a2:#818cf8;--a3:#a78bfa;
      --green:#22c55e;--gold:#f59e0b;--red:#ef4444;--cyan:#06b6d4;--pink:#ec4899;
      --text:#dde1f0;--muted:#4b5675;
      --font:"Inter",system-ui,sans-serif;--r:10px;
    }
    html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font);}

    /* ── Layout ── */
    .shell{display:flex;height:100vh;flex-direction:column;}
    .topbar{
      display:flex;align-items:center;justify-content:space-between;
      padding:10px 18px;background:var(--s1);border-bottom:1px solid var(--border);
      flex-shrink:0;
    }
    .tb-logo{display:flex;align-items:center;gap:9px;}
    .tb-icon{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#6366f1,#a78bfa,#06b6d4);display:flex;align-items:center;justify-content:center;font-size:16px;}
    .tb-name{font-size:13.5px;font-weight:800;letter-spacing:-.2px;}
    .tb-sub{font-size:9.5px;color:var(--muted);}
    .tb-right{display:flex;align-items:center;gap:9px;}
    .refresh-badge{font-size:10px;color:var(--muted);background:var(--s2);border:1px solid var(--border);padding:3px 9px;border-radius:99px;}
    .refresh-badge.live{color:var(--green);border-color:rgba(34,197,94,.3);}
    .back-btn{font-size:11px;color:var(--muted);background:var(--s2);border:1px solid var(--border);padding:4px 11px;border-radius:7px;cursor:pointer;text-decoration:none;transition:color .15s;}
    .back-btn:hover{color:var(--text);}

    /* ── Scrollable area ── */
    .grid-area{flex:1;overflow-y:auto;overflow-x:hidden;padding:12px 14px 20px;}
    .grid-area::-webkit-scrollbar{width:4px;}
    .grid-area::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px;}

    /* ── Grid ── */
    .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;}
    @media(max-width:1100px){.grid{grid-template-columns:repeat(2,1fr);}}
    @media(max-width:680px) {.grid{grid-template-columns:1fr;}}

    /* ── Card ── */
    .card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;display:flex;flex-direction:column;}
    .card.span2{grid-column:span 2;}
    .ch{
      padding:8px 12px;border-bottom:1px solid var(--border);
      display:flex;align-items:center;gap:7px;
      font-size:9.5px;font-weight:700;letter-spacing:1.1px;text-transform:uppercase;
      color:var(--a2);background:linear-gradient(90deg,rgba(99,102,241,.1),transparent);
      flex-shrink:0;
    }
    .ch-icon{font-size:13px;}
    .cb{padding:10px 12px;flex:1;}

    /* ── Identity ── */
    .identity-name{font-size:17px;font-weight:800;letter-spacing:-.3px;margin-bottom:1px;}
    .identity-level{font-size:10px;color:var(--a2);margin-bottom:8px;}
    .tags{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:8px;}
    .tag{font-size:9px;padding:2px 7px;border-radius:99px;background:rgba(99,102,241,.1);color:var(--a2);border:1px solid rgba(99,102,241,.2);}
    .tag.role{background:var(--s3);color:var(--muted);border-color:var(--border);}
    .stab-row{display:flex;align-items:center;gap:7px;margin-bottom:5px;}
    .stab-label{font-size:10px;color:var(--muted);min-width:58px;}
    .bar{flex:1;height:5px;background:var(--s3);border-radius:99px;overflow:hidden;}
    .fill{height:100%;border-radius:99px;transition:width .6s;}
    .bar-val{font-size:10.5px;font-weight:600;min-width:33px;text-align:right;}
    .id-meta{display:flex;gap:9px;font-size:10px;margin-top:6px;}
    .id-mi{color:var(--muted);}
    .id-mi span{color:var(--text);font-weight:600;}

    /* ── Skills ── */
    .skill-row{display:flex;align-items:center;gap:6px;margin-bottom:6px;}
    .skill-name{font-size:10.5px;min-width:88px;}
    .skill-cat{font-size:8px;padding:1px 4px;border-radius:3px;background:var(--s3);color:var(--muted);}
    .skill-delta{font-size:8.5px;font-weight:600;min-width:30px;text-align:right;}
    .transfers{margin-top:7px;padding-top:7px;border-top:1px solid var(--border);}
    .tr-title{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:4px;}
    .tr-row{font-size:9.5px;color:var(--muted);display:flex;align-items:center;gap:4px;margin-bottom:2px;}
    .tr-arr{color:var(--a2);}

    /* ── Workspace ── */
    .ws-row{margin-bottom:7px;}
    .ws-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:2px;}
    .ws-val{font-size:11.5px;color:var(--text);line-height:1.4;}
    .artifact-list{display:flex;flex-direction:column;gap:2px;margin-top:4px;}
    .artifact-item{font-size:9.5px;color:var(--muted);background:var(--s2);padding:2px 7px;border-radius:4px;border:1px solid var(--border);}
    .q-list{display:flex;flex-direction:column;gap:2px;margin-top:4px;}
    .q-item{font-size:9.5px;color:var(--gold);}

    /* ── Memory ── */
    .mem-layer{display:flex;align-items:center;gap:7px;margin-bottom:5px;}
    .mem-label{font-size:10px;min-width:108px;}
    .mem-count{font-size:9.5px;font-weight:600;min-width:26px;text-align:right;color:var(--a2);}
    .mem-concepts{display:flex;flex-wrap:wrap;gap:2px;margin-top:6px;}
    .concept{font-size:8.5px;padding:1px 5px;border-radius:3px;background:var(--s3);color:var(--muted);border:1px solid var(--border);}
    .dream-queue{margin-top:7px;padding-top:7px;border-top:1px solid var(--border);}
    .dq-title{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:3px;}
    .dq-item{font-size:9.5px;color:var(--a3);margin-bottom:2px;}

    /* ── Reality ── */
    .rc-table{width:100%;border-collapse:collapse;}
    .rc-table th{font-size:8.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;padding:3px 5px;text-align:left;border-bottom:1px solid var(--border);}
    .rc-table td{font-size:10px;padding:4px 5px;border-bottom:1px solid rgba(30,40,72,.5);}
    .rc-table tr:last-child td{border-bottom:none;}
    .rc-pass{color:var(--green);}
    .rc-fail{color:var(--red);}
    .conf-high{color:var(--green);}
    .conf-med{color:var(--gold);}
    .conf-low{color:var(--red);}
    .ev-src{font-size:8px;color:var(--muted);background:var(--s3);padding:1px 4px;border-radius:3px;}

    /* ── Contradictions ── */
    .contr-item{background:var(--s2);border:1px solid var(--border);border-radius:7px;padding:7px 9px;margin-bottom:5px;}
    .contr-item:last-child{margin-bottom:0;}
    .contr-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
    .contr-score{font-size:9.5px;font-weight:700;color:var(--red);}
    .contr-type{font-size:8px;padding:1px 5px;border-radius:3px;background:rgba(99,102,241,.1);color:var(--a2);}
    .contr-type.critical{background:rgba(239,68,68,.1);color:var(--red);}
    .contr-beliefs{display:flex;gap:4px;align-items:flex-start;}
    .contr-belief{flex:1;font-size:9.5px;color:var(--muted);background:var(--s3);padding:3px 6px;border-radius:4px;line-height:1.4;}
    .contr-vs{font-size:9px;color:var(--border);align-self:center;flex-shrink:0;}
    .contr-reason{font-size:8.5px;color:var(--muted);margin-top:4px;font-style:italic;}
    .no-contr{font-size:11px;color:var(--green);text-align:center;padding:10px 0;}

    /* ── Development ── */
    .dev-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:9px;}
    .dev-stat{background:var(--s2);border:1px solid var(--border);border-radius:7px;padding:6px 8px;text-align:center;}
    .dev-val{font-size:17px;font-weight:800;color:var(--a2);}
    .dev-lbl{font-size:8.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-top:1px;}
    .dev-bar-row{display:flex;align-items:center;gap:6px;margin-bottom:4px;}
    .dev-bar-lbl{font-size:9.5px;color:var(--muted);min-width:68px;}

    /* ── Sleep ── */
    .sleep-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:5px;margin-bottom:8px;}
    .sleep-item{background:var(--s2);border:1px solid var(--border);border-radius:7px;padding:6px 8px;}
    .sleep-val{font-size:16px;font-weight:800;color:var(--cyan);}
    .sleep-lbl{font-size:8.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-top:1px;}
    .dream-insights{margin-top:8px;padding-top:8px;border-top:1px solid var(--border);}
    .dream-title{font-size:9px;color:var(--a3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:4px;}
    .dream-item{font-size:10px;color:var(--muted);padding:3px 0;display:flex;gap:5px;align-items:flex-start;}
    .dream-item::before{content:"💭";flex-shrink:0;}
    .sleep-next{font-size:10.5px;color:var(--muted);}
    .sleep-next span{color:var(--a2);font-weight:600;}

    /* ── Thought Birth ── */
    .tb-flow{display:flex;flex-direction:column;gap:4px;}
    .tb-node{display:flex;align-items:flex-start;gap:7px;}
    .tb-icon2{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;background:var(--s3);border:1px solid var(--border);}
    .tb-body{flex:1;}
    .tb-lbl{font-size:8.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:1px;}
    .tb-txt{font-size:10.5px;color:var(--text);line-height:1.45;}
    .tb-arr{font-size:11px;color:var(--border);padding-left:8px;}
    .tb-result{background:linear-gradient(90deg,rgba(99,102,241,.1),transparent);border:1px solid rgba(99,102,241,.2);border-radius:7px;padding:7px 9px;margin-top:3px;}
    .tb-result-lbl{font-size:8.5px;color:var(--a2);text-transform:uppercase;letter-spacing:.7px;margin-bottom:2px;}
    .tb-result-txt{font-size:11px;color:var(--text);line-height:1.5;}

    /* ── Simulation ── */
    .sim-plans{display:flex;flex-direction:column;gap:4px;}
    .sim-plan{background:var(--s2);border:1px solid var(--border);border-radius:7px;padding:6px 9px;}
    .sim-plan-head{display:flex;align-items:center;gap:6px;margin-bottom:3px;}
    .sim-label{font-size:9.5px;font-weight:700;color:var(--a2);background:rgba(99,102,241,.12);padding:1px 6px;border-radius:3px;}
    .sim-text{font-size:10.5px;color:var(--text);line-height:1.4;margin-bottom:2px;}
    .sim-outcome{font-size:9.5px;color:var(--muted);}
    .sim-outcome span{color:var(--green);}
    .no-data{font-size:10.5px;color:var(--muted);text-align:center;padding:10px 0;font-style:italic;}

    /* ── Meta Cognition ── */
    .mc-row{display:flex;align-items:flex-start;gap:7px;margin-bottom:7px;}
    .mc-icon{font-size:14px;flex-shrink:0;}
    .mc-body{flex:1;}
    .mc-lbl{font-size:8.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:1px;}
    .mc-val{font-size:11px;color:var(--text);line-height:1.4;}
    .mc-correct{color:var(--green);font-weight:600;}
    .mc-warn{color:var(--gold);font-weight:600;}

    /* ── Founder Deep ── */
    .fd-section{margin-bottom:10px;}
    .fd-section:last-child{margin-bottom:0;}
    .fd-title{font-size:9px;color:var(--a2);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px;display:flex;align-items:center;gap:4px;}
    .fd-goal-item{background:var(--s2);border:1px solid var(--border);border-radius:6px;padding:5px 8px;margin-bottom:3px;display:flex;align-items:center;justify-content:space-between;}
    .fd-goal-text{font-size:10.5px;color:var(--text);}
    .fd-goal-status{font-size:8px;padding:1px 6px;border-radius:99px;}
    .fd-goal-status.in_progress{background:rgba(99,102,241,.15);color:var(--a2);}
    .fd-goal-status.completed{background:rgba(34,197,94,.15);color:var(--green);}
    .fd-goal-status.planned{background:rgba(75,86,117,.2);color:var(--muted);}
    .fd-habit-row{display:flex;align-items:center;gap:6px;margin-bottom:4px;}
    .fd-habit-name{font-size:10px;flex:1;color:var(--text);}
    .fd-habit-freq{font-size:8px;color:var(--muted);background:var(--s3);padding:1px 4px;border-radius:3px;}
    .stress-row{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
    .stress-label{font-size:10px;color:var(--muted);min-width:50px;}
    .stress-sources{display:flex;flex-wrap:wrap;gap:3px;margin-top:3px;}
    .stress-source{font-size:8.5px;padding:1px 5px;border-radius:3px;background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.2);}
    .pref-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;}
    .pref-item{background:var(--s2);border:1px solid var(--border);border-radius:5px;padding:4px 7px;}
    .pref-key{font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:1px;}
    .pref-val{font-size:10px;color:var(--text);}
    .ltp-item{font-size:10px;color:var(--muted);padding:2px 0;display:flex;gap:5px;}
    .ltp-item::before{content:"→";color:var(--a2);flex-shrink:0;}

    /* ── Self Trainer ── */
    .st-item{background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;margin-bottom:6px;}
    .st-item:last-child{margin-bottom:0;}
    .st-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
    .st-skill{font-size:12px;font-weight:700;color:var(--text);}
    .st-priority{font-size:8.5px;font-weight:600;padding:2px 7px;border-radius:99px;background:rgba(239,68,68,.12);color:var(--red);}
    .st-scores{display:flex;gap:6px;margin-bottom:6px;align-items:center;}
    .st-score-box{text-align:center;flex:1;background:var(--s3);border-radius:5px;padding:4px 3px;}
    .st-score-val{font-size:13px;font-weight:800;}
    .st-score-lbl{font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
    .st-arrow{font-size:14px;color:var(--border);}
    .st-suggestion{font-size:10px;color:var(--a2);margin-bottom:3px;}
    .st-improvement{font-size:10.5px;font-weight:600;color:var(--green);}
    .st-topics{font-size:9px;color:var(--muted);margin-top:3px;}

    /* ── Beliefs ── */
    .belief-item{background:var(--s2);border:1px solid var(--border);border-radius:6px;padding:6px 9px;margin-bottom:4px;}
    .belief-item:last-child{margin-bottom:0;}
    .belief-txt{font-size:10.5px;color:var(--text);line-height:1.4;margin-bottom:4px;}
    .belief-meta{display:flex;align-items:center;gap:6px;}
    .belief-src{font-size:8.5px;color:var(--muted);margin-left:auto;}

    /* ── Pulsing dot ── */
    .live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);display:inline-block;margin-right:4px;animation:blink 1.5s infinite;}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
  </style>
</head>
<body>
<div class="shell">

  <header class="topbar">
    <div class="tb-logo">
      <div class="tb-icon">🧠</div>
      <div>
        <div class="tb-name">ChetnaOS Cognitive Dashboard</div>
        <div class="tb-sub">Full internal state — auto-refresh every 5 seconds</div>
      </div>
    </div>
    <div class="tb-right">
      <span class="refresh-badge live" id="refresh-badge"><span class="live-dot"></span>Live</span>
      <a class="back-btn" href="/" onclick="sessionStorage.setItem('chetna_restore','1')">← Back to Chat</a>
    </div>
  </header>

  <div class="grid-area">
    <div class="grid" id="dashboard-grid">
      <div style="grid-column:span 3;text-align:center;padding:40px;color:var(--muted);font-size:13px;">
        Loading cognitive state…
      </div>
    </div>
  </div>

</div>

<script>
const $ = id => document.getElementById(id);
const esc = s => String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
const pct = (v,mx=1) => Math.round(Math.min(100, Math.max(0, v/mx*100)));
const confColor = lvl => ({HIGH:"conf-high",MEDIUM:"conf-med",LOW:"conf-low",VERY_LOW:"conf-low"}[lvl]||"");
function skillColor(s){return s>=0.8?"var(--green)":s>=0.6?"var(--cyan)":s>=0.4?"var(--gold)":"var(--red)";}
function card(title,icon,body,cls=""){return `<div class="card ${cls}"><div class="ch"><span class="ch-icon">${icon}</span>${title}</div><div class="cb">${body}</div></div>`;}

// ─── IDENTITY ──────────────────────────────────────────────────────────────
function buildIdentity(d){
  const id=d.identity||{};
  const traits=(id.core_traits||[]).map(t=>`<span class="tag">${esc(t)}</span>`).join("");
  const roles=(id.roles||[]).map(r=>`<span class="tag role">${esc(r)}</span>`).join("");
  const stab=id.stability||80, drift=id.drift||20;
  return card("Identity","👤",`
    <div class="identity-name">${esc(id.name||"ChetnaOS")}</div>
    <div class="identity-level">${esc(id.level||"Level 6")} — ${esc(id.description||"Computational Developmental Organism")}</div>
    <div class="tags">${traits}</div>
    <div class="tags">${roles}</div>
    <div class="stab-row">
      <span class="stab-label">Stability</span>
      <div class="bar"><div class="fill" style="width:${stab}%;background:var(--green)"></div></div>
      <span class="bar-val" style="color:var(--green)">${stab}%</span>
    </div>
    <div class="stab-row">
      <span class="stab-label">Drift</span>
      <div class="bar"><div class="fill" style="width:${drift}%;background:var(--gold)"></div></div>
      <span class="bar-val" style="color:var(--gold)">${drift}%</span>
    </div>
    <div class="id-meta">
      <div class="id-mi">Cycles: <span>${id.cycle_count||0}</span></div>
      <div class="id-mi">Updates: <span>${id.updates||0}</span></div>
      <div class="id-mi">Values: <span style="color:var(--green)">${id.core_values_preserved?"✅ Preserved":"⚠️ Drifting"}</span></div>
    </div>
  `);
}

// ─── SKILLS ────────────────────────────────────────────────────────────────
function buildSkills(d){
  const sk=d.skills||{};
  const ranked=sk.ranked||[];
  const transfers=(sk.transfers||[]).slice(0,4);
  const rows=ranked.map(s=>{
    const delta=(s.last_delta||0)*100;
    const deltaStr=delta>0?`<span class="skill-delta" style="color:var(--green)">+${delta.toFixed(1)}%</span>`:
                   delta<0?`<span class="skill-delta" style="color:var(--red)">${delta.toFixed(1)}%</span>`:
                   `<span class="skill-delta" style="color:var(--muted)">—</span>`;
    return `<div class="skill-row">
      <span class="skill-name">${esc(s.name)}</span>
      <span class="skill-cat">${esc(s.category||"")}</span>
      <div class="bar"><div class="fill" style="width:${pct(s.score)}%;background:${skillColor(s.score)}"></div></div>
      <span class="bar-val">${(s.score*100).toFixed(0)}%</span>
      ${deltaStr}
    </div>`;
  }).join("");
  const trRows=transfers.map(t=>`<div class="tr-row">🔗 ${esc(t.from)} <span class="tr-arr">→</span> ${esc(t.to)} <span style="color:var(--a2)">(${Math.round(t.strength*100)}%)</span></div>`).join("");
  return card("Skill Tree","🌲",`
    ${rows}
    ${trRows?`<div class="transfers"><div class="tr-title">Skill Transfer</div>${trRows}</div>`:""}
  `);
}

// ─── WORKSPACE ─────────────────────────────────────────────────────────────
function buildWorkspace(d){
  const ws=d.workspace||{};
  const arts=(ws.artifacts||[]).slice(0,4);
  const qs=(ws.unsolved_questions||[]).slice(0,3);
  const pri=ws.active_priority||70;
  return card("Active Workspace","🖥️",`
    <div class="ws-row"><div class="ws-label">Current Thought</div><div class="ws-val">${esc(ws.current_thought||"—")}</div></div>
    <div class="ws-row"><div class="ws-label">Current Goal</div><div class="ws-val">${esc(ws.current_goal||"—")}</div></div>
    <div class="ws-row"><div class="ws-label">Priority</div>
      <div style="display:flex;align-items:center;gap:7px;margin-top:2px">
        <div class="bar"><div class="fill" style="width:${pri}%;background:var(--accent)"></div></div>
        <span style="font-size:10px;color:var(--a2)">${pri}</span>

function buildMemory(d){
  const m=d.memory||{};
  const maxLT=Math.max(m.long_term_count||1,1);
  const layers=[
    {label:"Working Memory", count:m.working_count||0, color:"var(--cyan)", max:5},
    {label:"Long-Term",      count:m.long_term_count||0,color:"var(--accent)",max:maxLT},
    {label:"Semantic",       count:m.semantic_count||0, color:"var(--a3)",   max:30},
    {label:"Episodic",       count:m.episodic_count||0, color:"var(--green)",max:maxLT},
    {label:"Forgotten",      count:m.forgotten_count||0,color:"var(--red)",  max:Math.max(m.forgotten_count||1,1)},
  ];
  const rows=layers.map(l=>`<div class="mem-layer">
    <span class="mem-label">${l.label}</span>
    <div class="bar"><div class="fill" style="width:${pct(l.count,l.max)}%;background:${l.color}"></div></div>
    <span class="mem-count">${l.count}</span>
  </div>`).join("");
  const concepts=(m.semantic_concepts||[]).slice(0,10).map(c=>`<span class="concept">${esc(c)}</span>`).join("");

  return card("Memory Hierarchy","💾",`

function collectInfluence(d) {
  let mem = Array.isArray(d.memory_influence) ? d.memory_influence : [];
  let bel = Array.isArray(d.belief_influence) ? d.belief_influence : [];
  const ri = d.reasoning_integration || d.cognitive_organs?.reasoning_integration;
  if (ri && typeof ri === "object") {
    if (!mem.length && Array.isArray(ri.memory_influence)) mem = ri.memory_influence;
    if (!bel.length && Array.isArray(ri.belief_influence)) bel = ri.belief_influence;
  }
  return { mem, bel };
}

function buildMemoryInfluence(d){
  const { mem, bel } = collectInfluence(d);
  console.log("DASHBOARD influence", { mem: mem.length, bel: bel.length, keys: Object.keys(d).filter(k => k.includes("influence")) });
  if(!mem.length&&!bel.length) return card("Answer Influence","🔗",`<div class="no-data">No influence logged yet — send a chat message.</div>`);
  const mrows=mem.map(m=>`<div class="dq-item"><b>Memory</b> ${esc(m.text||String(m))} <span style="color:var(--muted)">${esc(m.source||"")}</span></div>`).join("");
  const brows=bel.map(b=>`<div class="dq-item"><b>Belief #${b.id ?? b.belief_id ?? "?"}</b> (${((b.confidence||0)*100).toFixed(0)}%) ${esc(b.text||"")}</div>`).join("");
  return card("Answer Influence","🔗",mrows+brows);
}

    ["Working Memory",`${wm.count??0} items · cap ${wm.capacity??"—"}`],
    ["Active Goal",active?`"${esc((active.text||"").slice(0,60))}"`:"none"],
    ["Goal Queue",`${gm.queue_size??0} queued`],
    ["Self-Confidence",sm.self_confidence!=null?`${(sm.self_confidence*100).toFixed(0)}%`:"—"],
    ["Known Limits",(sm.known_limits||[]).slice(0,3).join(", ")||"none"],
    ["Curiosity Novelty",cur.novelty_score!=null?cur.novelty_score:"—"],
    ["Emotion Tone",em.interaction_tone||em.state||"—"],
    ["Belief Revisions",br.revision_count??br.history_len??"—"],
  ].map(([k,v])=>`<div class="dev-bar-row"><span class="dev-bar-lbl">${k}</span><span style="font-size:10px;color:var(--text2);flex:1;text-align:right">${v}</span></div>`).join("");
  return card("Cognitive Organs","🧠",rows);
}

// ─── RENDER ────────────────────────────────────────────────────────────────
function renderDashboard(d){
  $("dashboard-grid").innerHTML = [
    buildCognitiveOrgans(d),
    buildCycleTrace(d),
    buildMemoryInfluence(d),
    buildMemoryRecallTrace(d),
    buildBeliefChanges(d),
    buildResolutions(d),
    buildIdentity(d),
    buildSkills(d),
    buildWorkspace(d),
    buildMemory(d),
    buildRealityChecks(d),
    buildContradictions(d),
    buildDevelopment(d),
    buildSleep(d),
    buildFounderDeep(d),
    buildThoughtBirth(d),
    buildSimulation(d),
    buildMetaCognition(d),
    buildSelfTrainer(d),
    buildBeliefs(d),
  ].join("");
}

async function loadDashboard(){
  try{
    const [d, ws] = await Promise.all([
      fetch("/api/dashboard").then(r=>r.json()),
      fetch("/api/workspace/session").then(r=>r.json()).catch(()=>({})),
    ]);
    if(d.available===false){
      $("dashboard-grid").innerHTML=`<div style="grid-column:span 3;text-align:center;padding:40px;color:var(--red)">⚠️ Dashboard unavailable: ${esc(d.error||"Runtime not started")}</div>`;
      return;
    }
    if (!Array.isArray(d.memory_influence) || !d.memory_influence.length) {
      d.memory_influence = ws.memory_influence || d.memory_influence || [];
    }
    if (!Array.isArray(d.belief_influence) || !d.belief_influence.length) {
      d.belief_influence = ws.belief_influence || d.belief_influence || [];
    }
    renderDashboard(d);
    const b=$("refresh-badge");
    b.innerHTML=`<span class="live-dot"></span>Updated ${new Date().toLocaleTimeString()}`;
    b.className="refresh-badge live";
  }catch(e){
    $("refresh-badge").textContent="⚠️ Error";
    $("refresh-badge").className="refresh-badge";
  }
}

loadDashboard();
setInterval(loadDashboard,5000);
</script>
