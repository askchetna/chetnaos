<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>ChetnaOS — Founder Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#060910;--s1:rgba(12,15,28,.78);--s2:rgba(17,22,40,.85);--s3:#172035;--border:rgba(99,102,241,.14);
      --accent:#6366f1;--a2:#818cf8;--a3:#a78bfa;
      --green:#34d399;--gold:#fbbf24;--red:#f87171;--cyan:#67e8f9;--pink:#f472b6;--amber:#fbbf24;
      --text:#e8eaf4;--muted:#6b7394;--text2:#9aa3c0;
      --font:"Inter",system-ui,sans-serif;--r:14px;--glass-blur:blur(22px);
      --shadow:0 8px 32px rgba(0,0,0,.35),0 1px 0 rgba(255,255,255,.04) inset;
    }
    html,body{height:100%;overflow:hidden;color:var(--text);font-family:var(--font);
      background:linear-gradient(165deg,#060910 0%,#0a0f22 35%,#0d1428 70%,#0a1020 100%);}

    /* ── Layout ── */
    .shell{display:flex;height:100vh;flex-direction:column;}
    .topbar{
      display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;
      padding:12px 22px;background:rgba(8,10,20,.88);backdrop-filter:var(--glass-blur);
      border-bottom:1px solid var(--border);flex-shrink:0;
    }
    .tb-logo{display:flex;align-items:center;gap:9px;}
    .tb-icon{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#6366f1,#a78bfa,#06b6d4);display:flex;align-items:center;justify-content:center;font-size:16px;}
    .tb-name{font-size:13.5px;font-weight:800;letter-spacing:-.2px;}
    .tb-sub{font-size:9.5px;color:var(--muted);}
    .tb-right{display:flex;align-items:center;gap:9px;}
    .refresh-badge{font-size:10px;color:var(--muted);background:var(--s2);border:1px solid var(--border);padding:3px 9px;border-radius:99px;}
    .refresh-badge.live{color:var(--green);border-color:rgba(34,197,94,.3);}
    .back-btn{font-size:11px;color:var(--muted);background:var(--s2);border:1px solid var(--border);padding:5px 12px;border-radius:8px;cursor:pointer;text-decoration:none;transition:all .18s;}
    .back-btn:hover{color:var(--text);border-color:rgba(129,140,248,.35);}

    /* ── Global nav tabs ── */
    .global-nav{display:flex;align-items:center;gap:4px;background:rgba(17,22,40,.6);border:1px solid var(--border);border-radius:10px;padding:3px;}
    .nav-tab{font-size:11.5px;font-weight:600;color:var(--muted);padding:6px 14px;border-radius:8px;text-decoration:none;transition:all .18s;letter-spacing:-.01em;}
    .nav-tab:hover{color:var(--text);background:rgba(99,102,241,.08);}
    .nav-tab.active{color:var(--text);background:linear-gradient(135deg,rgba(99,102,241,.22),rgba(167,139,250,.12));box-shadow:0 2px 8px rgba(99,102,241,.15);}
    .nav-tab.founder.active{border:1px solid rgba(167,139,250,.25);}

    /* ── Scrollable area ── */
    .grid-area{flex:1;overflow-y:auto;overflow-x:hidden;padding:20px 24px 48px;}
    .grid-area::-webkit-scrollbar{width:5px;}
    .grid-area::-webkit-scrollbar-thumb{background:rgba(99,102,241,.25);border-radius:99px;}

    /* ── Sections ── */
    .dashboard-section{margin-bottom:36px;}
    .dashboard-section:last-child{margin-bottom:0;}
    .section-head{display:flex;align-items:flex-start;gap:14px;margin:0 0 18px 2px;}
    .section-num{font-size:10px;font-weight:800;color:var(--a3);background:rgba(99,102,241,.12);border:1px solid rgba(99,102,241,.2);width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .section-title{font-size:11px;font-weight:700;letter-spacing:1.8px;text-transform:uppercase;color:var(--a2);}
    .section-sub{font-size:12px;color:var(--muted);margin-top:4px;line-height:1.45;font-weight:400;letter-spacing:0;text-transform:none;}

    /* ── Grid ── */
    .section-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
    .section-grid.cols-2{grid-template-columns:repeat(2,1fr);}
    .section-grid.cols-1{grid-template-columns:1fr;}
    @media(max-width:1100px){.section-grid{grid-template-columns:repeat(2,1fr);}}
    @media(max-width:680px){.section-grid,.section-grid.cols-2{grid-template-columns:1fr;}}

    /* ── Card ── */
    .card{background:var(--s1);backdrop-filter:var(--glass-blur);border:1px solid var(--border);border-radius:var(--r);
      overflow:hidden;display:flex;flex-direction:column;box-shadow:var(--shadow);transition:border-color .2s,box-shadow .2s;}
    .card:hover{border-color:rgba(129,140,248,.28);}
    .card.span2{grid-column:span 2;}
    .card.span3,.card.full{grid-column:1/-1;}
    .card.priority-high{border-color:rgba(129,140,248,.32);box-shadow:0 12px 40px rgba(99,102,241,.12),var(--shadow);}
    .card.priority-med{opacity:.97;}
    .card.priority-low{opacity:.92;}
    .ch{
      padding:11px 16px;border-bottom:1px solid var(--border);
      display:flex;align-items:center;gap:8px;
      font-size:9.5px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;
      color:var(--a2);background:linear-gradient(90deg,rgba(99,102,241,.12),rgba(167,139,250,.04),transparent);
      flex-shrink:0;
    }
    .ch-icon{font-size:14px;opacity:.9;}
    .cb{padding:14px 16px 16px;flex:1;}

    /* ── Current Mind hero ── */
    .mind-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
    @media(max-width:900px){.mind-grid{grid-template-columns:1fr 1fr;}}
    @media(max-width:520px){.mind-grid{grid-template-columns:1fr;}}
    .mind-cell{background:rgba(255,255,255,.025);border:1px solid rgba(99,102,241,.1);border-radius:11px;padding:14px 16px;}
    .mind-cell.highlight{grid-column:1/-1;background:linear-gradient(135deg,rgba(99,102,241,.1),rgba(167,139,250,.06));border-color:rgba(129,140,248,.22);}
    .mind-lbl{font-size:9px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.9px;margin-bottom:6px;}
    .mind-val{font-size:13px;line-height:1.5;color:var(--text);font-weight:500;}
    .mind-val.hero{font-size:15px;font-weight:600;line-height:1.45;}
    .mind-num{font-size:22px;font-weight:800;letter-spacing:-.5px;color:var(--a2);line-height:1;}
    .mind-num small{font-size:11px;font-weight:600;color:var(--muted);}

    /* ── Collapse ── */
    .collapse-block{background:var(--s1);backdrop-filter:var(--glass-blur);border:1px solid var(--border);border-radius:var(--r);margin-bottom:12px;overflow:hidden;}
    .collapse-block:last-child{margin-bottom:0;}
    .collapse-block summary{
      list-style:none;cursor:pointer;padding:12px 16px;display:flex;align-items:center;gap:10px;
      font-size:10.5px;font-weight:600;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;
      user-select:none;transition:background .15s;
    }
    .collapse-block summary::-webkit-details-marker{display:none;}
    .collapse-block summary:hover{background:rgba(99,102,241,.06);color:var(--text2);}
    .collapse-block[open] summary{color:var(--a2);border-bottom:1px solid var(--border);}
    .collapse-icon{font-size:14px;opacity:.85;}
    .collapse-chev{margin-left:auto;font-size:10px;opacity:.5;transition:transform .2s;}
    .collapse-block[open] .collapse-chev{transform:rotate(180deg);}
    .collapse-body{padding:14px 16px 16px;}
    .trace-section .section-title{color:var(--muted);}
    .trace-section .section-sub{opacity:.85;}
    .trace-section .section-grid{gap:12px;}

    /* ── Identity ── */
    .identity-name{font-size:17px;font-weight:800;letter-spacing:-.3px;margin-bottom:1px;}
    .identity-level{font-size:10px;color:var(--a2);margin-bottom:8px;}
    .tags{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:8px;}
    .tag{font-size:9px;padding:2px 7px;border-radius:99px;background:rgba(99,102,241,.1);color:var(--a2);border:1px solid rgba(99,102,241,.2);}
    .tag.role{background:var(--s3);color:var(--muted);border-color:var(--border);}
    .stab-row{display:flex;align-items:center;gap:7px;margin-bottom:5px;}
    .stab-label{font-size:10px;color:var(--muted);min-width:58px;}
    .bar{flex:1;height:5px;background:var(--s3);border-radius:99px;overflow:hidden;}
    .fill{height:100%;border-radius:99px;transition:width .6s;}
    .bar-val{font-size:10.5px;font-weight:600;min-width:33px;text-align:right;}
    .id-meta{display:flex;gap:9px;font-size:10px;margin-top:6px;}
    .id-mi{color:var(--muted);}
    .id-mi span{color:var(--text);font-weight:600;}

    /* ── Skills ── */
    .skill-row{display:flex;align-items:center;gap:6px;margin-bottom:6px;}
    .skill-name{font-size:10.5px;min-width:88px;}
    .skill-cat{font-size:8px;padding:1px 4px;border-radius:3px;background:var(--s3);color:var(--muted);}
    .skill-delta{font-size:8.5px;font-weight:600;min-width:30px;text-align:right;}
    .transfers{margin-top:7px;padding-top:7px;border-top:1px solid var(--border);}
    .tr-title{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:4px;}
    .tr-row{font-size:9.5px;color:var(--muted);display:flex;align-items:center;gap:4px;margin-bottom:2px;}
    .tr-arr{color:var(--a2);}

    /* ── Workspace ── */
    .ws-row{margin-bottom:7px;}
    .ws-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:2px;}
    .ws-val{font-size:11.5px;color:var(--text);line-height:1.4;}
    .artifact-list{display:flex;flex-direction:column;gap:2px;margin-top:4px;}
    .artifact-item{font-size:9.5px;color:var(--muted);background:var(--s2);padding:2px 7px;border-radius:4px;border:1px solid var(--border);}
    .q-list{display:flex;flex-direction:column;gap:2px;margin-top:4px;}
    .q-item{font-size:9.5px;color:var(--gold);}

    /* ── Memory ── */
    .mem-layer{display:flex;align-items:center;gap:7px;margin-bottom:5px;}
    .mem-label{font-size:10px;min-width:108px;}
    .mem-count{font-size:9.5px;font-weight:600;min-width:26px;text-align:right;color:var(--a2);}
    .mem-concepts{display:flex;flex-wrap:wrap;gap:2px;margin-top:6px;}
    .concept{font-size:8.5px;padding:1px 5px;border-radius:3px;background:var(--s3);color:var(--muted);border:1px solid var(--border);}
    .dream-queue{margin-top:7px;padding-top:7px;border-top:1px solid var(--border);}
    .dq-title{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:3px;}
    .dq-item{font-size:9.5px;color:var(--a3);margin-bottom:2px;}

    /* ── Reality ── */
    .rc-table{width:100%;border-collapse:collapse;}
    .rc-table th{font-size:8.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;padding:3px 5px;text-align:left;border-bottom:1px solid var(--border);}
    .rc-table td{font-size:10px;padding:4px 5px;border-bottom:1px solid rgba(30,40,72,.5);}
    .rc-table tr:last-child td{border-bottom:none;}
    .rc-pass{color:var(--green);}
    .rc-fail{color:var(--red);}
    .conf-high{color:var(--green);}
    .conf-med{color:var(--gold);}
    .conf-low{color:var(--red);}
    .ev-src{font-size:8px;color:var(--muted);background:var(--s3);padding:1px 4px;border-radius:3px;}

    /* ── Contradictions ── */
    .contr-item{background:var(--s2);border:1px solid var(--border);border-radius:7px;padding:7px 9px;margin-bottom:5px;}
    .contr-item:last-child{margin-bottom:0;}
    .contr-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
    .contr-score{font-size:9.5px;font-weight:700;color:var(--red);}
    .contr-type{font-size:8px;padding:1px 5px;border-radius:3px;background:rgba(99,102,241,.1);color:var(--a2);}
    .contr-type.critical{background:rgba(239,68,68,.1);color:var(--red);}
    .contr-beliefs{display:flex;gap:4px;align-items:flex-start;}
    .contr-belief{flex:1;font-size:9.5px;color:var(--muted);background:var(--s3);padding:3px 6px;border-radius:4px;line-height:1.4;}
    .contr-vs{font-size:9px;color:var(--border);align-self:center;flex-shrink:0;}
    .contr-reason{font-size:8.5px;color:var(--muted);margin-top:4px;font-style:italic;}
    .no-contr{font-size:11px;color:var(--green);text-align:center;padding:10px 0;}

    /* ── Development ── */
    .dev-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:9px;}
    .dev-stat{background:var(--s2);border:1px solid var(--border);border-radius:7px;padding:6px 8px;text-align:center;}
    .dev-val{font-size:17px;font-weight:800;color:var(--a2);}
    .dev-lbl{font-size:8.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-top:1px;}
    .dev-bar-row{display:flex;align-items:center;gap:6px;margin-bottom:4px;}
    .dev-bar-lbl{font-size:9.5px;color:var(--muted);min-width:68px;}

    /* ── Sleep ── */
    .sleep-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:5px;margin-bottom:8px;}
    .sleep-item{background:var(--s2);border:1px solid var(--border);border-radius:7px;padding:6px 8px;}
    .sleep-val{font-size:16px;font-weight:800;color:var(--cyan);}
    .sleep-lbl{font-size:8.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-top:1px;}
    .dream-insights{margin-top:8px;padding-top:8px;border-top:1px solid var(--border);}
    .dream-title{font-size:9px;color:var(--a3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:4px;}
    .dream-item{font-size:10px;color:var(--muted);padding:3px 0;display:flex;gap:5px;align-items:flex-start;}
    .dream-item::before{content:"💭";flex-shrink:0;}
    .sleep-next{font-size:10.5px;color:var(--muted);}
    .sleep-next span{color:var(--a2);font-weight:600;}

    /* ── Thought Birth ── */
    .tb-flow{display:flex;flex-direction:column;gap:4px;}
    .tb-node{display:flex;align-items:flex-start;gap:7px;}
    .tb-icon2{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;background:var(--s3);border:1px solid var(--border);}
    .tb-body{flex:1;}
    .tb-lbl{font-size:8.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:1px;}
    .tb-txt{font-size:10.5px;color:var(--text);line-height:1.45;}
    .tb-arr{font-size:11px;color:var(--border);padding-left:8px;}
    .tb-result{background:linear-gradient(90deg,rgba(99,102,241,.1),transparent);border:1px solid rgba(99,102,241,.2);border-radius:7px;padding:7px 9px;margin-top:3px;}
    .tb-result-lbl{font-size:8.5px;color:var(--a2);text-transform:uppercase;letter-spacing:.7px;margin-bottom:2px;}
    .tb-result-txt{font-size:11px;color:var(--text);line-height:1.5;}

    /* ── Simulation ── */
    .sim-plans{display:flex;flex-direction:column;gap:4px;}
    .sim-plan{background:var(--s2);border:1px solid var(--border);border-radius:7px;padding:6px 9px;}
    .sim-plan-head{display:flex;align-items:center;gap:6px;margin-bottom:3px;}
    .sim-label{font-size:9.5px;font-weight:700;color:var(--a2);background:rgba(99,102,241,.12);padding:1px 6px;border-radius:3px;}
    .sim-text{font-size:10.5px;color:var(--text);line-height:1.4;margin-bottom:2px;}
    .sim-outcome{font-size:9.5px;color:var(--muted);}
    .sim-outcome span{color:var(--green);}
    .no-data{font-size:10.5px;color:var(--muted);text-align:center;padding:10px 0;font-style:italic;}

    /* ── Meta Cognition ── */
    .mc-row{display:flex;align-items:flex-start;gap:7px;margin-bottom:7px;}
    .mc-icon{font-size:14px;flex-shrink:0;}
    .mc-body{flex:1;}
    .mc-lbl{font-size:8.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:1px;}
    .mc-val{font-size:11px;color:var(--text);line-height:1.4;}
    .mc-correct{color:var(--green);font-weight:600;}
    .mc-warn{color:var(--gold);font-weight:600;}

    /* ── Founder Deep ── */
    .fd-section{margin-bottom:10px;}
    .fd-section:last-child{margin-bottom:0;}
    .fd-title{font-size:9px;color:var(--a2);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px;display:flex;align-items:center;gap:4px;}
    .fd-goal-item{background:var(--s2);border:1px solid var(--border);border-radius:6px;padding:5px 8px;margin-bottom:3px;display:flex;align-items:center;justify-content:space-between;}
    .fd-goal-text{font-size:10.5px;color:var(--text);}
    .fd-goal-status{font-size:8px;padding:1px 6px;border-radius:99px;}
    .fd-goal-status.in_progress{background:rgba(99,102,241,.15);color:var(--a2);}
    .fd-goal-status.completed{background:rgba(34,197,94,.15);color:var(--green);}
    .fd-goal-status.planned{background:rgba(75,86,117,.2);color:var(--muted);}
    .gp-healthy{color:var(--green);}
    .gp-warning{color:var(--amber);}
    .gp-stalled{color:var(--red);}
    .gp-completed{color:var(--a2);}
    .fd-habit-row{display:flex;align-items:center;gap:6px;margin-bottom:4px;}
    .fd-habit-name{font-size:10px;flex:1;color:var(--text);}
    .fd-habit-freq{font-size:8px;color:var(--muted);background:var(--s3);padding:1px 4px;border-radius:3px;}
    .stress-row{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
    .stress-label{font-size:10px;color:var(--muted);min-width:50px;}
    .stress-sources{display:flex;flex-wrap:wrap;gap:3px;margin-top:3px;}
    .stress-source{font-size:8.5px;padding:1px 5px;border-radius:3px;background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.2);}
    .pref-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;}
    .pref-item{background:var(--s2);border:1px solid var(--border);border-radius:5px;padding:4px 7px;}
    .pref-key{font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:1px;}
    .pref-val{font-size:10px;color:var(--text);}
    .ltp-item{font-size:10px;color:var(--muted);padding:2px 0;display:flex;gap:5px;}
    .ltp-item::before{content:"→";color:var(--a2);flex-shrink:0;}

    /* ── Self Trainer ── */
    .st-item{background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;margin-bottom:6px;}
    .st-item:last-child{margin-bottom:0;}
    .st-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
    .st-skill{font-size:12px;font-weight:700;color:var(--text);}
    .st-priority{font-size:8.5px;font-weight:600;padding:2px 7px;border-radius:99px;background:rgba(239,68,68,.12);color:var(--red);}
    .st-scores{display:flex;gap:6px;margin-bottom:6px;align-items:center;}
    .st-score-box{text-align:center;flex:1;background:var(--s3);border-radius:5px;padding:4px 3px;}
    .st-score-val{font-size:13px;font-weight:800;}
    .st-score-lbl{font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
    .st-arrow{font-size:14px;color:var(--border);}
    .st-suggestion{font-size:10px;color:var(--a2);margin-bottom:3px;}
    .st-improvement{font-size:10.5px;font-weight:600;color:var(--green);}
    .st-topics{font-size:9px;color:var(--muted);margin-top:3px;}

    /* ── Beliefs ── */
    .belief-item{background:var(--s2);border:1px solid var(--border);border-radius:6px;padding:6px 9px;margin-bottom:4px;}
    .belief-item:last-child{margin-bottom:0;}
    .belief-txt{font-size:10.5px;color:var(--text);line-height:1.4;margin-bottom:4px;}
    .belief-meta{display:flex;align-items:center;gap:6px;}
    .belief-src{font-size:8.5px;color:var(--muted);margin-left:auto;}

    /* ── Embedding diagnostics ── */
    .emb-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:6px;}
    .emb-stat{background:var(--s2);border:1px solid var(--border);border-radius:7px;padding:6px 8px;text-align:center;}
    .emb-val{font-size:14px;font-weight:800;}
    .emb-lbl{font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:2px;}
    .emb-on{color:var(--green);}
    .emb-off{color:var(--red);}
    .emb-warn{color:var(--gold);}

    /* ── Pulsing dot ── */
    .live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);display:inline-block;margin-right:4px;animation:blink 1.5s infinite;}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
  </style>
</head>
<body>
<div class="shell">

  <header class="topbar">
    <div class="tb-logo">
      <div class="tb-icon">🧠</div>
      <div>
        <div class="tb-name">ChetnaOS Founder Dashboard</div>
        <div class="tb-sub">Cognitive AI System — MRI view · auto-refresh 5s</div>
      </div>
    </div>
    <nav class="global-nav" aria-label="Primary">
      <a class="nav-tab" href="/" onclick="sessionStorage.setItem('chetna_restore','1')">Chat</a>
      <a class="nav-tab" href="/" onclick="sessionStorage.setItem('chetna_mode','agent')">Agent</a>
      <a class="nav-tab" href="/" onclick="sessionStorage.setItem('chetna_mode','goal')">Goals</a>
      <a class="nav-tab founder active" href="/dashboard" aria-current="page">Dashboard</a>
    </nav>
    <div class="tb-right">
      <span class="refresh-badge live" id="refresh-badge"><span class="live-dot"></span>Live</span>
    </div>
  </header>

  <div class="grid-area">
    <div id="dashboard-root">
      <div style="text-align:center;padding:60px 20px;color:var(--muted);font-size:14px;">
        Loading cognitive state…
      </div>
    </div>
  </div>

</div>

<script type="module">
import { apiGet } from "./api.js";

const $ = id => document.getElementById(id);
const esc = s => String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
const pct = (v,mx=1) => Math.round(Math.min(100, Math.max(0, v/mx*100)));
const confColor = lvl => ({HIGH:"conf-high",MEDIUM:"conf-med",LOW:"conf-low",VERY_LOW:"conf-low"}[lvl]||"");
function skillColor(s){return s>=0.8?"var(--green)":s>=0.6?"var(--cyan)":s>=0.4?"var(--gold)":"var(--red)";}

/** Purge any stored absolute URLs that could point at stale dev hosts. */
(function purgeStaleApiHosts(){
  for (const store of [localStorage, sessionStorage]) {
    try {
      const keys = [];
      for (let i = 0; i < store.length; i++) keys.push(store.key(i));
      for (const k of keys) {
        const v = store.getItem(k);
        if (v && /https?:\/\//i.test(v)) store.removeItem(k);
      }
    } catch (_) {}
  }
})();
function card(title,icon,body,cls=""){return `<div class="card ${cls}"><div class="ch"><span class="ch-icon">${icon}</span>${title}</div><div class="cb">${body}</div></div>`;}
function section(num,title,subtitle,gridHtml,extraCls=""){
  return `<section class="dashboard-section ${extraCls}">
    <div class="section-head"><span class="section-num">${num}</span>
    <div><div class="section-title">${title}</div><div class="section-sub">${subtitle}</div></div></div>
    <div class="section-grid">${gridHtml}</div>
  </section>`;
}
function collapseBlock(title,icon,innerHtml,closed=true){
  return `<details class="collapse-block"${closed?"":" open"}>
    <summary><span class="collapse-icon">${icon}</span><span>${title}</span><span class="collapse-chev">▾</span></summary>
    <div class="collapse-body">${innerHtml}</div>
  </details>`;
}
function parseDomain(ws,gp){
  const g=String(ws.current_goal||gp.goal||"");
  const m=g.match(/Answer about (\w+):/i);
  return m?m[1]:"—";
}
function fmtConf(v){
  if(v==null||v==="") return "—";
  const n=Number(v);
  return Number.isFinite(n)?(n<=1?(n*100).toFixed(0)+"%":Math.round(n)+"%"):"—";
}

// ─── CURRENT MIND (Section 1) ─────────────────────────────────────────────
function buildCurrentMind(d){
  const ws=d.workspace||{};
  const tb=d.thought_birth||{};
  const gp=d.goal_progress||{};
  const ag=(d.cognitive_organs||{}).goal_manager?.active_goal||{};
  const mc=d.meta_cognition||{};
  const em=(d.cognitive_organs||{}).emotion||{};
  const rc=(d.reality_checks||[])[0];
  const thought=ws.current_thought||tb.new_thought||tb.sense||"—";
  const goal=ws.current_goal||gp.goal||ag.text||"—";
  const pri=ws.active_priority??"—";
  const tone=em.interaction_tone||em.state||"—";
  const conf=gp.confidence??ag.confidence??rc?.confidence??mc.correctness;
  const domain=parseDomain(ws,gp);
  const verdict=mc.self_verdict||"—";
  const verdictColor=verdict==="good"?"var(--green)":verdict==="poor"?"var(--red)":"var(--gold)";
  return `<div class="card full priority-high"><div class="cb" style="padding-top:18px"><div class="mind-grid">
      <div class="mind-cell highlight"><div class="mind-lbl">Current Thought</div><div class="mind-val hero">${esc(thought)}</div></div>
      <div class="mind-cell highlight"><div class="mind-lbl">Current Goal</div><div class="mind-val hero">${esc(String(goal).slice(0,180))}</div></div>
      <div class="mind-cell"><div class="mind-lbl">Attention / Priority</div><div class="mind-num">${pri}<small> / 100</small></div><div class="mind-val" style="margin-top:6px;font-size:11px;color:var(--muted)">${esc(tone)}</div></div>
      <div class="mind-cell"><div class="mind-lbl">Confidence</div><div class="mind-num">${fmtConf(conf)}</div></div>
      <div class="mind-cell"><div class="mind-lbl">Domain</div><div class="mind-val" style="font-size:16px;font-weight:700;color:var(--a3);text-transform:capitalize">${esc(domain)}</div></div>
      <div class="mind-cell"><div class="mind-lbl">Self Verdict</div><div class="mind-val" style="font-size:16px;font-weight:700;color:${verdictColor};text-transform:capitalize">${esc(verdict)}</div></div>
    </div></div></div>`;
}

// ─── CONSTITUTION & VALUES (Section 3 helpers) ───────────────────────────────
function buildConstitution(d){
  const fc=d.founder_context||{};
  const phases=(fc.known_phases||[]).slice(0,4).map(p=>`<div class="ltp-item">${esc(p)}</div>`).join("");
  const constraints=(fc.founder_constraints||[]).map(c=>`<div class="dq-item">${esc(c)}</div>`).join("");
  return card("Constitution","📜",`
    <div class="ws-row"><div class="ws-label">Primary Mission</div><div class="ws-val">${esc(fc.primary_mission||"—")}</div></div>
    <div class="ws-row"><div class="ws-label">Current Milestone</div><div class="ws-val">${esc(fc.current_milestone||"—")}</div></div>
    <div class="ws-row"><div class="ws-label">Current Project</div><div class="ws-val">${esc(fc.current_project||"—")}</div></div>
    ${constraints?`<div class="ws-row"><div class="ws-label">Constraints</div>${constraints}</div>`:""}
    ${phases?`<div class="ws-row" style="margin-top:8px"><div class="ws-label">Known Phases</div>${phases}</div>`:""}
  `,"priority-high");
}

function buildValues(d){
  const id=d.identity||{};
  const prefs=(d.founder_context||{}).founder_preferences||{};
  const prefGrid=Object.entries(prefs).slice(0,6).map(([k,v])=>`<div class="pref-item"><div class="pref-key">${esc(k.replace(/_/g," "))}</div><div class="pref-val">${esc(v)}</div></div>`).join("");
  return card("Values","💎",`
    <div class="id-meta" style="margin-bottom:10px">
      <div class="id-mi">Core values: <span style="color:${id.core_values_preserved?"var(--green)":"var(--gold)"}">${id.core_values_preserved?"Preserved":"Drifting"}</span></div>
    </div>
    ${prefGrid?`<div class="pref-grid">${prefGrid}</div>`:`<div class="no-data">No preference data yet.</div>`}
  `);
}

// ─── DREAM CONSOLIDATION (Section 2) ───────────────────────────────────────
function buildDreamConsolidation(d){
  const sl=d.sleep||{};
  const mem=d.memory||{};
  const log=d.last_sleep_log||{};
  const insights=log.dream_insights||d.last_sleep?.dream_insights||[];
  const insightHtml=insights.length
    ? insights.map(i=>`<div class="dream-item">${esc(i.insight||i)}</div>`).join("")
    : `<div style="font-size:10px;color:var(--muted);font-style:italic">No dream consolidation yet — every ${sl.sleep_every||20} cycles.</div>`;
  return card("Dream Consolidation","🌙",`
    <div class="sleep-grid">
      <div class="sleep-item"><div class="sleep-val">${mem.forgotten_count||0}</div><div class="sleep-lbl">Forgotten</div></div>
      <div class="sleep-item"><div class="sleep-val" style="color:var(--green)">${mem.long_term_count||0}</div><div class="sleep-lbl">Consolidated</div></div>
      <div class="sleep-item"><div class="sleep-val" style="color:var(--gold)">${log.dream_replayed||0}</div><div class="sleep-lbl">Replayed</div></div>
      <div class="sleep-item"><div class="sleep-val" style="color:var(--a3)">${sl.cycles_until_next??"—"}</div><div class="sleep-lbl">Cycles to sleep</div></div>
    </div>
    <div class="dream-insights"><div class="dream-title">Last consolidation insights</div>${insightHtml}</div>
  `);
}

function buildWorkingMemoryDetail(d){
  const m=d.memory||{};
  const items=(m.working_memory||[]).slice(0,5);
  if(!items.length) return "";
  const rows=items.map(i=>`<div class="dq-item">${esc(typeof i==="string"?i:(i.text||JSON.stringify(i)).slice(0,100))}</div>`).join("");
  return card("Working Memory Items","⚡",rows);
}

// ─── PROGRESS TRACKS (Section 4) ───────────────────────────────────────────
function buildProgressTrack(d,keywords,title,icon){
  const fc=d.founder_context||{};
  const goals=(fc.founder_goals||[]).filter(g=>keywords.some(k=>(g.goal||"").toLowerCase().includes(k)));
  const plans=(fc.long_term_plans||[]).filter(p=>keywords.some(k=>String(p).toLowerCase().includes(k))).slice(0,3);
  if(!goals.length&&!plans.length) return card(title,icon,`<div class="no-data">No ${title.toLowerCase()} items mapped yet.</div>`);
  const goalRows=goals.map(g=>{
    const sc=g.status||"planned";
    return `<div class="fd-goal-item"><span class="fd-goal-text">${esc(g.goal||"")}</span><span class="fd-goal-status ${sc}">${sc.replace(/_/g," ")}</span></div>`;
  }).join("");
  const planRows=plans.map(p=>`<div class="ltp-item">${esc(p)}</div>`).join("");
  return card(title,icon,`${goalRows}${planRows?`<div style="margin-top:8px">${planRows}</div>`:""}`);
}

function buildGrowthRecommendations(d){
  const dev=d.development||{};
  const total=dev.total_cycles||0, good=dev.good_cycles||0;
  const avg=((dev.avg_confidence||0.5)*100).toFixed(0);
  return card("Growth Recommendations","🌱",`
    <div class="dev-bar-row"><span class="dev-bar-lbl">Cycle quality</span><div class="bar"><div class="fill" style="width:${total?pct(good,total):0}%;background:var(--green)"></div></div><span style="font-size:10px;font-weight:700;color:var(--green)">${total?pct(good,total):0}%</span></div>
    <div class="dev-bar-row"><span class="dev-bar-lbl">Avg confidence</span><div class="bar"><div class="fill" style="width:${avg}%;background:var(--accent)"></div></div><span style="font-size:10px;font-weight:700;color:var(--a2)">${avg}%</span></div>
    <div style="font-size:10px;color:var(--muted);margin-top:10px">Based on development timeline · training goals in Self Trainer card</div>
  `);
}

function buildConfidenceReview(d){
  const mc=d.meta_cognition||{};
  const gp=d.goal_progress||{};
  const score=((mc.correctness??gp.confidence??0)*100).toFixed(0);
  return card("Confidence Review","📊",`
    <div class="mc-row"><span class="mc-icon">🎯</span><div class="mc-body"><div class="mc-lbl">Meta correctness</div><div class="mc-val"><span class="mind-num" style="font-size:20px">${score}%</span></div></div></div>
    <div class="mc-row"><span class="mc-icon">📈</span><div class="mc-body"><div class="mc-lbl">Goal confidence</div><div class="mc-val">${fmtConf(gp.confidence)}</div></div></div>
    <div style="font-size:10px;color:var(--muted);margin-top:6px">Aggregated from meta-cognition and goal progress</div>
  `,"priority-med");
}

function buildCycleSummary(d){
  const trace=(d.cognitive_organs||{}).last_cycle_trace||[];
  const cycleId=trace[0]?.cycle_id||"—";
  const totalMs=trace.reduce((s,t)=>s+(t.duration_ms||0),0);
  const stages=trace.length;
  return card("Cycle Overview","⏱",`
    <div class="dev-stats">
      <div class="dev-stat"><div class="dev-val" style="font-size:13px">${esc(String(cycleId).slice(0,14))}</div><div class="dev-lbl">Cycle ID</div></div>
      <div class="dev-stat"><div class="dev-val">${totalMs||"—"}</div><div class="dev-lbl">Duration ms</div></div>
      <div class="dev-stat"><div class="dev-val">${stages}</div><div class="dev-lbl">Cycle steps</div></div>
    </div>
    <div style="font-size:10px;color:var(--muted);margin-top:10px">Expand trace panels below for debugging detail</div>
  `,"full priority-low");
}

// ─── IDENTITY ──────────────────────────────────────────────────────────────
function buildIdentity(d){
  const id=d.identity||{};
  const traits=(id.core_traits||[]).map(t=>`<span class="tag">${esc(t)}</span>`).join("");
  const roles=(id.roles||[]).map(r=>`<span class="tag role">${esc(r)}</span>`).join("");
  const stab=id.stability||80, drift=id.drift||20;
  return card("Identity","👤",`
    <div class="identity-name">${esc(id.name||"ChetnaOS")}</div>
    <div class="identity-level">${esc(id.level||"Level 6")} — ${esc(id.description||"Cognitive AI System")}</div>
    <div class="tags">${traits}</div>
    <div class="tags">${roles}</div>
    <div class="stab-row">
      <span class="stab-label">Stability</span>
      <div class="bar"><div class="fill" style="width:${stab}%;background:var(--green)"></div></div>
      <span class="bar-val" style="color:var(--green)">${stab}%</span>
    </div>
    <div class="stab-row">
      <span class="stab-label">Drift</span>
      <div class="bar"><div class="fill" style="width:${drift}%;background:var(--gold)"></div></div>
      <span class="bar-val" style="color:var(--gold)">${drift}%</span>
    </div>
    <div class="id-meta">
      <div class="id-mi">Cycle count: <span>${id.cycle_count||0}</span></div>
      <div class="id-mi">Updates: <span>${id.updates||0}</span></div>
    </div>
  `,"priority-high");
}

// ─── SKILLS ────────────────────────────────────────────────────────────────
function buildSkills(d){
  const sk=d.skills||{};
  const ranked=sk.ranked||[];
  const transfers=(sk.transfers||[]).slice(0,4);
  const rows=ranked.map(s=>{
    const delta=(s.last_delta||0)*100;
    const deltaStr=delta>0?`<span class="skill-delta" style="color:var(--green)">+${delta.toFixed(1)}%</span>`:
                   delta<0?`<span class="skill-delta" style="color:var(--red)">${delta.toFixed(1)}%</span>`:
                   `<span class="skill-delta" style="color:var(--muted)">—</span>`;
    return `<div class="skill-row">
      <span class="skill-name">${esc(s.name)}</span>
      <span class="skill-cat">${esc(s.category||"")}</span>
      <div class="bar"><div class="fill" style="width:${pct(s.score)}%;background:${skillColor(s.score)}"></div></div>
      <span class="bar-val">${(s.score*100).toFixed(0)}%</span>
      ${deltaStr}
    </div>`;
  }).join("");
  const trRows=transfers.map(t=>`<div class="tr-row">🔗 ${esc(t.from)} <span class="tr-arr">→</span> ${esc(t.to)} <span style="color:var(--a2)">(${Math.round(t.strength*100)}%)</span></div>`).join("");
  return card("Skill Tree","🌲",`
    ${rows}
    ${trRows?`<div class="transfers"><div class="tr-title">Skill Transfer</div>${trRows}</div>`:""}
  `,"priority-high");
}

// ─── WORKSPACE ─────────────────────────────────────────────────────────────
function buildWorkspace(d){
  const ws=d.workspace||{};
  const arts=(ws.artifacts||[]).slice(0,4);
  const qs=(ws.unsolved_questions||[]).slice(0,3);
  const pri=ws.active_priority||70;
  return card("Active Workspace","🖥️",`
    <div class="ws-row"><div class="ws-label">Current Thought</div><div class="ws-val">${esc(ws.current_thought||"—")}</div></div>
    <div class="ws-row"><div class="ws-label">Current Goal</div><div class="ws-val">${esc(ws.current_goal||"—")}</div></div>
    <div class="ws-row"><div class="ws-label">Priority</div>
      <div style="display:flex;align-items:center;gap:7px;margin-top:2px">
        <div class="bar"><div class="fill" style="width:${pri}%;background:var(--accent)"></div></div>
        <span style="font-size:10px;color:var(--a2)">${pri}</span>
      </div>
    </div>
    <div class="ws-row"><div class="ws-label">Hypothesis</div><div class="ws-val">${esc(ws.current_hypothesis||"—")}</div></div>
    ${ws.pending_contradictions>0?`<div class="ws-row"><div class="ws-label" style="color:var(--gold)">⚠️ Pending Contradictions</div><div class="ws-val" style="color:var(--gold)">${ws.pending_contradictions}</div></div>`:""}
    ${arts.length?`<div class="ws-row"><div class="ws-label">Artifacts Created</div><div class="artifact-list">${arts.map(a=>`<div class="artifact-item">📄 ${esc(a.name)}</div>`).join("")}</div></div>`:""}
    ${qs.length?`<div class="ws-row"><div class="ws-label">Unsolved Questions</div><div class="q-list">${qs.map(q=>`<div class="q-item">? ${esc(q)}</div>`).join("")}</div></div>`:""}
  `);
}

// ─── MEMORY ────────────────────────────────────────────────────────────────
function buildMemory(d){
  const m=d.memory||{};
  const maxLT=Math.max(m.long_term_count||1,1);
  const layers=[
    {label:"Working Memory", count:m.working_count||0, color:"var(--cyan)", max:5},
    {label:"Long Term Memory", count:m.long_term_count||0,color:"var(--accent)",max:maxLT},
    {label:"Semantic Memory",  count:m.semantic_count||0, color:"var(--a3)",   max:30},
    {label:"Episodic Memory", count:m.episodic_count||0, color:"var(--green)",max:maxLT},
    {label:"Forgotten",      count:m.forgotten_count||0,color:"var(--red)",  max:Math.max(m.forgotten_count||1,1)},
  ];
  const rows=layers.map(l=>`<div class="mem-layer">
    <span class="mem-label">${l.label}</span>
    <div class="bar"><div class="fill" style="width:${pct(l.count,l.max)}%;background:${l.color}"></div></div>
    <span class="mem-count">${l.count}</span>
  </div>`).join("");
  const concepts=(m.semantic_concepts||[]).slice(0,10).map(c=>`<span class="concept">${esc(c)}</span>`).join("");
  const dq=(m.dream_queue||[]).slice(0,3).map(i=>`<div class="dq-item">💭 ${esc(i)}</div>`).join("");
  return card("Memory State","💾",`
    ${rows}
    ${concepts?`<div class="mem-concepts">${concepts}</div>`:""}
    ${dq?`<div class="dream-queue"><div class="dq-title">Dream Queue</div>${dq}</div>`:""}
  `,"priority-high");
}

// ─── REALITY CHECKS ────────────────────────────────────────────────────────
function buildRealityChecks(d){
  const checks=d.reality_checks||[];
  if(!checks.length) return card("Reality Verification","🔍",`<div class="no-data">No reality checks yet. Send a message to start.</div>`);
  const rows=checks.map(c=>{
    const cc=confColor(c.level||"MEDIUM");
    return `<tr>
      <td style="max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(c.statement||"")}</td>
      <td class="${cc}">${((c.confidence||0)*100).toFixed(0)}%</td>
      <td>${esc((c.truth||"").replace(/_/g," "))}</td>
      <td><span class="ev-src">internal</span></td>
      <td class="${c.passed?"rc-pass":"rc-fail"}">${c.passed?"✅":"⚠️"}</td>
    </tr>`;
  }).join("");
  return card("Reality Verification","🔍",`
    <table class="rc-table">
      <thead><tr><th>Statement</th><th>Conf</th><th>Truth</th><th>Source</th><th>Status</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  `);
}

// ─── CONTRADICTIONS ────────────────────────────────────────────────────────
function buildContradictions(d){
  const cs=d.contradictions||[];
  if(!cs.length) return card("Contradiction Tracker","⚡",`<div class="no-contr">✅ No contradictions detected in belief store.</div>`);
  const typeLabel={
    belief_vs_belief:"B vs B",
    belief_vs_memory:"B vs Mem",
    belief_vs_founder_mission:"B vs Mission",
  };
  const items=cs.slice(0,5).map(c=>{
    const tl=typeLabel[c.type]||c.type||"conflict";
    const isCrit=c.status==="critical";
    return `<div class="contr-item">
      <div class="contr-header">
        <span class="contr-score">Conflict ${c.conflict_score||0}%</span>
        <span class="contr-type ${isCrit?"critical":""}">${tl}</span>
      </div>
      <div class="contr-beliefs">
        <div class="contr-belief">"${esc(c.belief_a||"")}"</div>
        <span class="contr-vs">vs</span>
        <div class="contr-belief">"${esc(c.belief_b||"")}"</div>
      </div>
      ${c.reason?`<div class="contr-reason">⚠️ ${esc(c.reason)}</div>`:""}
    </div>`;
  }).join("");
  return card("Contradiction Tracker","⚡",items);
}

// ─── DEVELOPMENT ───────────────────────────────────────────────────────────
function buildDevelopment(d){
  const dev=d.development||{};
  const total=dev.total_cycles||0, good=dev.good_cycles||0, poor=dev.poor_cycles||0;
  const avg=((dev.avg_confidence||0.5)*100).toFixed(0);
  return card("Development Timeline","📈",`
    <div class="dev-stats">
      <div class="dev-stat"><div class="dev-val">${total}</div><div class="dev-lbl">Total Cycles</div></div>
      <div class="dev-stat"><div class="dev-val" style="color:var(--green)">${good}</div><div class="dev-lbl">Good Cycles</div></div>
      <div class="dev-stat"><div class="dev-val" style="color:var(--red)">${poor}</div><div class="dev-lbl">Poor Cycles</div></div>
    </div>
    <div class="dev-bar-row"><span class="dev-bar-lbl">Good rate</span><div class="bar"><div class="fill" style="width:${total?pct(good,total):0}%;background:var(--green)"></div></div><span style="font-size:9.5px;min-width:30px;text-align:right;color:var(--green)">${total?pct(good,total):0}%</span></div>

function collectInfluence(d) {
  let mem = Array.isArray(d.memory_influence) ? d.memory_influence : [];
  let bel = Array.isArray(d.belief_influence) ? d.belief_influence : [];
  const ri = d.reasoning_integration || d.cognitive_organs?.reasoning_integration;
  if (ri && typeof ri === "object") {
    if (!mem.length && Array.isArray(ri.memory_influence)) mem = ri.memory_influence;
    if (!bel.length && Array.isArray(ri.belief_influence)) bel = ri.belief_influence;
  }
  return { mem, bel };
}

function buildMemoryInfluence(d){
  const { mem, bel } = collectInfluence(d);
  if(!mem.length&&!bel.length) return card("Recent Recall","🔗",`<div class="no-data">No influence logged yet — send a chat message.</div>`);
  const mrows=mem.map(m=>`<div class="dq-item"><b>Memory</b> ${esc(m.text||String(m))} <span style="color:var(--muted)">${esc(m.source||"")}</span></div>`).join("");
  const brows=bel.map(b=>`<div class="dq-item"><b>Belief #${b.id ?? b.belief_id ?? "?"}</b> (${((b.confidence||0)*100).toFixed(0)}%) ${esc(b.text||"")}</div>`).join("");
  return card("Recent Recall","🔗",mrows+brows);
}

function buildGoalProgress(d){
  const gp=d.goal_progress||{};
  const ag=(d.cognitive_organs||{}).goal_manager?.active_goal||{};
  const goal=gp.goal||ag.text||"—";
  const expected=gp.expected_progress??ag.expected_progress;
  const actual=gp.actual_progress??ag.actual_progress;
  const error=gp.prediction_error??ag.prediction_error;
  const status=gp.health||ag.health||"—";
  const conf=gp.confidence??ag.confidence;
  const next=gp.next_action||ag.next_action||"—";
  if(!gp.active&&!ag.id) return card("Goal Progress","🎯",`<div class="no-data">No active goal — progress loop idle.</div>`);
  const statusCls=status==="healthy"?"gp-healthy":status==="warning"?"gp-warning":status==="stalled"?"gp-stalled":status==="completed"?"gp-completed":"";
  const errSign=error>0?"+":"";
  const milestones=(gp.milestones||ag.milestones||[]);
  const msRows=milestones.slice(0,5).map(m=>{
    const st=m.status||"pending";
    const stColor=st==="completed"?"var(--green)":st==="active"?"var(--a2)":st==="pending"?"var(--muted)":"var(--gold)";
    const p=m.progress!=null?`${Number(m.progress).toFixed(0)}%`:"—";
    return `<div class="dq-item" style="display:flex;justify-content:space-between;gap:8px">
      <span style="flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(m.title||"")}</span>
      <span style="color:${stColor};font-size:9px">${esc(st)}</span>
      <span style="color:var(--a2);font-size:9px">${p}</span>
    </div>`;
  }).join("");
  const blocked=gp.blocked_reason?`<div class="dq-item"><b>Blocked reason</b> ${esc(gp.blocked_reason)}</div>`:"";
  const rec=gp.recommended_next_step?`<div class="dq-item"><b>Recommended next step</b> ${esc(gp.recommended_next_step)}</div>`:"";
  const stalled=status==="stalled"&&gp.corrective_recommendation?`<div class="dq-item" style="margin-top:6px"><b>Self-correction</b> ${esc(gp.stalled_diagnosis||"")}<br><span style="color:var(--a2)">${esc(gp.corrective_recommendation||"")}</span></div>`:"";
  const body=`
    <div class="dq-item"><b>Goal</b> ${esc(String(goal).slice(0,100))}</div>
    <div class="dq-item"><b>Expected</b> ${expected!=null?expected+"%":"—"} · <b>Actual</b> ${actual!=null?actual+"%":"—"} · <b>Error</b> <span class="${statusCls}">${error!=null?errSign+error+"%":"—"}</span></div>
    <div class="dq-item"><b>Status</b> <span class="${statusCls}">${esc(status)}</span> · <b>Confidence</b> ${conf!=null?(conf*100).toFixed(0)+"%":"—"}</div>
    <div class="dq-item"><b>Next action</b> ${esc(String(next).slice(0,120))}</div>
    ${milestones.length?`<div style="margin-top:8px"><div style="font-size:10px;color:var(--muted);margin-bottom:4px">Milestones</div>${msRows}</div>`:""}
    ${blocked}
    ${rec}
    ${stalled}`;
  return card("Goal Progress","🎯",body);
}

      `<div style="grid-column:1/-1;display:flex;flex-direction:column;gap:12px">`+
      collapseBlock("Thought Birth Pipeline","✨",buildThoughtBirth(d))+
      collapseBlock("Workspace Detail","🖥️",buildWorkspace(d))+
      `</div>`
    ),
    section("2","Memory","Memory layers, consolidation, and recall.",
      buildMemory(d)+
      (wmDetail||"")+
      buildDreamConsolidation(d)+
      `<div style="grid-column:1/-1;display:flex;flex-direction:column;gap:12px">`+
      collapseBlock("Recent Recall","🔗",buildMemoryInfluence(d))+
      collapseBlock("Memory Recall Trace","🧠",buildMemoryRecallTrace(d))+
      collapseBlock("Embedding Diagnostics","🔬",buildEmbeddingsDiagnostics(emb))+
      `</div>`
    ),
    section("3","Identity","Continuity, values, beliefs, and constitution.",
      buildIdentity(d)+
      buildValues(d)+
      buildBeliefs(d)+
      buildConstitution(d)
    ),
    section("4","Development","Skills, training, and founder progress tracks.",
      buildSkills(d)+
      buildSelfTrainer(d)+
      buildGrowthRecommendations(d)+
      buildProgressTrack(d,bizKw,"Business Progress","📊")+
      buildProgressTrack(d,salesKw,"Sales Progress","💰")+
      buildProgressTrack(d,researchKw,"Research Progress","🔬")+
      buildGoalProgress(d)+
      `<div style="grid-column:1/-1;display:flex;flex-direction:column;gap:12px">`+
      collapseBlock("Development Timeline","📈",buildDevelopment(d))+
      collapseBlock("Founder Deep Model","🎯",buildFounderDeep(d))+
      `</div>`
    ),
    section("5","Meta Cognition","Reflective evaluation, conflicts, and verification.",
      buildMetaCognition(d)+
      buildContradictions(d)+
      buildResolutions(d)+
      `<div style="grid-column:1/-1;display:flex;flex-direction:column;gap:12px">`+
      collapseBlock("Simulation Plans","🔮",buildSimulation(d))+
      collapseBlock("Confidence Review","📊",buildConfidenceReview(d))+
      collapseBlock("Reality Verification","🔍",buildRealityChecks(d))+
      `</div>`
    ),
    section("6","Cycle Trace","Debugging transparency — expand for detail.",
      buildCycleSummary(d)+
      `<div style="grid-column:1/-1;display:flex;flex-direction:column;gap:12px">`+
      collapseBlock("Cycle Steps","📋",buildCycleTrace(d))+
      collapseBlock("Activated Organs","🧬",buildCognitiveOrgans(d))+
      collapseBlock("Belief Update Logs","📈",buildBeliefChanges(d))+
      collapseBlock("Memory Recall Trace","🧠",buildMemoryRecallTrace(d))+
      `</div>`,
      "trace-section"
    ),
  ].join("");
}

async function loadDashboard(){
  const root = $("dashboard-root");

  let d = {};
  try {
    d = await apiGet("/api/dashboard");
    if (!("available" in d)) {
      throw new Error("Could not reach /api/dashboard (network or DNS error)");
    }
  } catch (e) {
    root.innerHTML = `<div style="text-align:center;padding:60px 20px;color:var(--red)">⚠️ Could not load dashboard: ${esc(e.message||String(e))}<br><span style="font-size:12px;color:var(--muted)">Using same-origin <code>/api/dashboard</code> — check that the server is running on this host.</span></div>`;
    $("refresh-badge").textContent = "⚠️ Error";
    $("refresh-badge").className = "refresh-badge";
    return;
  }

  if (d.available === false) {
    root.innerHTML = `<div style="text-align:center;padding:60px 20px;color:var(--red)">⚠️ Dashboard unavailable: ${esc(d.error||"Runtime not started")}</div>`;
    $("refresh-badge").textContent = "⚠️ Error";
    $("refresh-badge").className = "refresh-badge";
    return;
  }

  let ws = {};
  try {
    ws = await apiGet("/api/workspace/session");
  } catch (e) {
    console.error(e);
  }

  let emb = {};
  try {
    emb = await apiGet("/api/debug/embeddings");
    if (!emb || Object.keys(emb).length === 0) {
      emb = { error: "Diagnostics unavailable" };
    }
  } catch (e) {
    console.error(e);
    emb = { error: String(e.message || e) };
  }

  if (!Array.isArray(d.memory_influence) || !d.memory_influence.length) {
    d.memory_influence = ws.memory_influence || d.memory_influence || [];
  }
  if (!Array.isArray(d.belief_influence) || !d.belief_influence.length) {
    d.belief_influence = ws.belief_influence || d.belief_influence || [];
  }

  try {
    renderDashboard(d, emb);
    const b = $("refresh-badge");
    b.innerHTML = `<span class="live-dot"></span>Updated ${new Date().toLocaleTimeString()}`;
    b.className = "refresh-badge live";
  } catch (e) {
    root.innerHTML = `<div style="text-align:center;padding:60px 20px;color:var(--red)">⚠️ Dashboard error: ${esc(e.message||String(e))}</div>`;
    $("refresh-badge").textContent = "⚠️ Error";
    $("refresh-badge").className = "refresh-badge";
  }
}

loadDashboard();
setInterval(loadDashboard,5000);
</script>
